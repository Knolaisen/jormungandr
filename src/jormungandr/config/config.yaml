
trainer:
  epochs: 1
  batch_size: 45 # Per GPU/process. 45 for 80GB A100, 22 for 40GB A100
  seed: 42
  learning_rate: 1e-4
  optimizer: "AdamW"
  log_interval: 10
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  gradient_clip_norm: 1.0
  accelerate:
    mixed_precision: "no"
  loss:
    name: "giouloss" # Options: "giouloss", "ciouloss"
    class_cost: 1.0
    bbox_cost: 5.0
    giou_cost: 2.0  
    num_labels: 91
    eos_coefficient: 0.1
    auxiliary_loss: false
    bbox_loss_coefficient: 5.0
    giou_loss_coefficient: 2.0

fafnir:
  input_size: 224
  num_classes: 92
  encoder:
    type: "Mamba"
    num_layers: 6
